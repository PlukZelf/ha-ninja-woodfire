name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Validate manifest version matches tag
        run: |
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('custom_components/ninja_woodfire/manifest.json'))['version'])")
          TAG_VERSION=${{ steps.version.outputs.VERSION }}
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: manifest.json version ($MANIFEST_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version check passed: $MANIFEST_VERSION"

      - name: Create zip for HACS
        run: |
          cd custom_components
          zip -r ../ninja_woodfire.zip ninja_woodfire/
          cd ..
          echo "Created ninja_woodfire.zip"

      - name: Determine if pre-release
        id: prerelease
        run: |
          if [[ "${{ github.ref_name }}" == *"-beta"* ]] || [[ "${{ github.ref_name }}" == *"-alpha"* ]] || [[ "${{ github.ref_name }}" == *"-rc"* ]]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_OUTPUT
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Ninja Woodfire ${{ github.ref_name }}"
          prerelease: ${{ steps.prerelease.outputs.IS_PRERELEASE }}
          generate_release_notes: true
          files: ninja_woodfire.zip
          body: |
            ## Installation via HACS

            1. HACS → Integraties → ⋮ → Custom repositories
            2. Voeg toe: `https://github.com/PlukZelf/ha-ninja-woodfire`
            3. Categorie: Integration
            4. Installeer **Ninja Woodfire**
            5. Herstart Home Assistant

            ## Manual installation

            Download `ninja_woodfire.zip`, extract naar `/config/custom_components/`.

            ## Minimum vereisten
            - Home Assistant 2026.6.0+
            - ARM64 host (Raspberry Pi 4/5, HA Yellow, HA Green)
